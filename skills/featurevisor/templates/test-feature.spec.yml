feature: <featureKey>
assertions:
  - description: Catch-all is enabled in staging
    environment: staging
    at: 99
    context:
      userId: 'test-user-1'
    expectedToBeEnabled: true

  - description: Production is gated for everyone at 0% rollout
    environment: production
    at: 99
    context:
      userId: 'test-user-1'
    expectedToBeEnabled: false

  # If the feature has variations, assert each by picking `at` in their weight band.
  # Variation weights of 50/50 → control covers ~[0,50), treatment ~[50,100).
  # - description: Treatment variation in production
  #   environment: production
  #   at: 75
  #   context:
  #     userId: 'test-user-1'
  #   expectedToBeEnabled: true
  #   expectedVariation: treatment
  #   expectedVariables:
  #     bgColor: blue

  # Matrix example — same expectations across multiple contexts:
