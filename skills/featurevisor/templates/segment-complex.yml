description: Adult iPhone users in NL or DE, not on the newsletter
conditions:
  - and:
      - attribute: device
        operator: equals
        value: iPhone
      - attribute: age
        operator: greaterThanOrEquals
        value: 18

  - or:
      - attribute: country
        operator: equals
        value: nl
      - attribute: country
        operator: equals
        value: de

  - not:
      - attribute: subscribedToNewsletter
        operator: equals
        value: true

