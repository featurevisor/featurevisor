feature: showBanner
assertions:
  ##
  # Enabled
  #
  - at: 10
    environment: staging
    context: {}
    expectedToBeEnabled: true

  - matrix:
      at: [10, 20, 30]
      platform: [web]
    at: ${{ at }}
    environment: production
    description: "At ${{ at }}% in production, the feature should be enabled for web"
    context:
      platform: ${{ platform }}
    expectedToBeEnabled: true

  - matrix:
      at: [10, 20, 30]
      platform: [ios]
    at: ${{ at }}
    environment: production
    description: "At ${{ at }}% in production, the feature should be enabled for ios"
    context:
      platform: ${{ platform }}
    expectedToBeEnabled: true

  - matrix:
      at: [10, 20]
      platform: [android]
    at: ${{ at }}
    environment: production
    description: "At ${{ at }}% in production, the feature should be enabled for android"
    context:
      platform: ${{ platform }}
    expectedToBeEnabled: true

  ##
  # Disabled
  #
  - matrix:
      at: [60, 80, 90]
      platform: [ios]
    at: ${{ at }}
    environment: production
    description: "At ${{ at }}% in production, the feature should be disabled for ios"
    context:
      platform: ${{ platform }}
    expectedToBeEnabled: false

  - matrix:
      at: [40, 50, 60]
      platform: [android]
    at: ${{ at }}
    environment: production
    description: "At ${{ at }}% in production, the feature should be disabled for android"
    context:
      platform: ${{ platform }}
    expectedToBeEnabled: false

  ##
  # Enabled (with target)
  #
  # No additional context is needed to be passed
  #

  # enabled
  - at: 10
    environment: staging
    target: browsers
    context: {}
    expectedToBeEnabled: true

  - matrix:
      at: [10, 20, 30, 40, 80, 100]
    at: ${{ at }}
    environment: production
    target: browsers
    description: "At ${{ at }}% in production, the feature should be enabled for browsers target"
    context: {}
    expectedToBeEnabled: true

  - matrix:
      at: [10, 20, 30, 40]
    at: ${{ at }}
    environment: production
    target: ios
    description: "At ${{ at }}% in production, the feature should be enabled for ios target"
    context: {}
    expectedToBeEnabled: true

  - matrix:
      at: [10, 20]
    at: ${{ at }}
    environment: production
    target: ios
    description: "At ${{ at }}% in production, the feature should be enabled for android target"
    context: {}
    expectedToBeEnabled: true

  # disabled
  - matrix:
      at: [60, 80]
    at: ${{ at }}
    environment: production
    target: ios
    description: "At ${{ at }}% in production, the feature should be disabled for ios target"
    context: {}
    expectedToBeEnabled: false

  - matrix:
      at: [40, 80]
    at: ${{ at }}
    environment: production
    target: android
    description: "At ${{ at }}% in production, the feature should be disabled for android target"
    context: {}
    expectedToBeEnabled: false

  - at: 10
    environment: production
    target: selected-web
    description: Explicitly excluded feature should not exist in selected web target
    context: {}
    expectedToBeEnabled: false
