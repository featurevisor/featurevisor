feature: browserOptimization
assertions:
  ##
  # Staging - everyone enabled
  #
  - at: 50
    environment: staging
    context: {}
    expectedToBeEnabled: true

  ##
  # Production - Chrome users
  #
  - matrix:
      at: [10, 50, 90]
    at: ${{ at }}
    environment: production
    description: "At ${{ at }}% in production, Chrome user should be enabled"
    context:
      browser: chrome
    expectedToBeEnabled: true

  - matrix:
      at: [10, 50]
    at: ${{ at }}
    environment: production
    description: "At ${{ at }}% in production, Firefox user should be enabled"
    context:
      browser: firefox
    expectedToBeEnabled: true

  - matrix:
      at: [60, 90]
    at: ${{ at }}
    environment: production
    description: "At ${{ at }}% in production, Firefox user should be disabled"
    context:
      browser: firefox
    expectedToBeEnabled: false

  ##
  # Testing with chrome target
  #
  - matrix:
      at: [10, 50, 90]
    at: ${{ at }}
    environment: production
    target: chrome
    description: "At ${{ at }}% in production with chrome target, should be enabled"
    context: {}
    expectedToBeEnabled: true

  - at: 50
    environment: production
    target: selected-web
    description: Included browser feature should exist in selected web target
    context: {}
    expectedToBeEnabled: true
