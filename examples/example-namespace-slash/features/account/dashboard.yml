description: Account dashboard combining variations and variables
tags:
  - all
  - account

bucketBy: user/id
disabledVariationValue: classic

variablesSchema:
  navigationStyle:
    type: string
    defaultValue: sidebar
  showInsights:
    type: boolean
    defaultValue: false

variations:
  - value: classic
    weight: 50
  - value: modern
    weight: 50
    variables:
      navigationStyle: top
      showInsights: true

rules:
  staging:
    - key: everyone
      segments: "*"
      percentage: 100
  production:
    - key: everyone
      segments: "*"
      percentage: 100
