  - checkout

bucketBy: user/id
disabledVariationValue: control

variations:
  - value: control
    weight: 50
  - value: redesigned
    weight: 50

rules:
  staging:
    - key: everyone
      segments: "*"
      percentage: 100
  production:
    - key: netherlands
      segments: audience/netherlands
      percentage: 100
      variation: redesigned
    - key: everyone
      segments: "*"
      percentage: 50
