description: Feature exercising default flat object and array attribute behavior
tags:
  - all

bucketBy: userId

rules:
  staging:
    - key: everyone
      segments: "*"
      percentage: 100

  production:
    - key: dark-mode-sports
      segments:
        and:
          - prefersDarkMode
          - interestedInSports
      percentage: 100

    - key: everyone
      segments: "*"
      percentage: 0
