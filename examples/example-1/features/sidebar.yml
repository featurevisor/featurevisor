description: Show sidebar or not
tags:
  - all

bucketBy: userId

variablesSchema:
  position:
    type: string
    description: position of the sidebar
    defaultValue: left
  color:
    type: string
    defaultValue: red
  sections:
    type: array
    defaultValue: []
  title:
    type: string
    defaultValue: "Sidebar Title"
  title2:
    type: string
    defaultValue: "Sidebar Title 2"
  title3:
    type: string
    defaultValue: "Sidebar Title 3"
  title4:
    type: string
    defaultValue: "Sidebar Title 4"
  title5:
    type: string
    defaultValue: "Sidebar Title 5"
  title6:
    type: string
    defaultValue: "Sidebar Title 6"
  title7:
    type: string
    defaultValue: "Sidebar Title 7"

variations:
  - value: control
    weight: 10
  - value: treatment
    weight: 90
    variables:
      - key: position
        value: right
      - key: color
        value: red
        overrides:
          - segments:
              - countries/germany
            value: yellow
          - segments:
              - countries/switzerland
            value: white
      - key: sections
        value: ["home", "about", "contact"]
        overrides:
          - segments:
              - countries/germany
            value: ["home", "about", "contact", "imprint"]
          - segments:
              - countries/netherlands
            value: ["home", "about", "contact", "bitterballen"]

environments:
  staging:
    expose:
      - all
    rules:
      - key: "1"
        segments: "*"
        percentage: 100
  production:
    rules:
      - key: "1"
        segments: "*"
        percentage: 100
        variables:
          title: Sidebar Title for production
